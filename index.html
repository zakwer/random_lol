			function randomDate(){
				var $today = new Date();
				var $dd = $today.getDate(), $mm = $today.getMonth(), $yyyy = $today.getFullYear();
				$rand = Math.floor(Math.random()*11);
				$dd = $rand+$dd; $mm = $rand+$mm;
				$hh = $rand+$today.getHours(); $mmm = $rand+$mm;
				$yyyy = $yyyy-$rand;
				if($dd>28){$dd = 28;}; if($mm>12){$mm = 12;}
				if($hh>24){$hh = 24;}; if($mmm>60){$mmm = 60;};
				if($dd<10){$dd='0'+$dd}
				if($mm<10){$mm='0'+$mm}
				$randDate=$dd+"/"+$mm+"/"+$yyyy+' '+$hh+':'+$mmm+':'+$today.getSeconds();
				return $randDate;
			}
